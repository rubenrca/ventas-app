<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#2563eb">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Gestión de Ventas</title>

  <!-- CSS -->
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/forms.css">
  <link rel="stylesheet" href="css/tables.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

  <!-- Header -->
  <header class="app-header">
    <h1>Gestión de Ventas</h1>
  </header>

  <!-- Views -->
  <main>
    <section id="view-registrar" class="view"></section>
    <section id="view-historial" class="view"></section>
    <section id="view-catalogo" class="view"></section>
    <section id="view-exportar" class="view"></section>
    <section id="view-dashboard" class="view"></section>
  </main>

  <!-- Bottom Navigation -->
  <nav id="bottom-nav" class="bottom-nav">
    <button class="nav-btn" data-view="registrar">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
      </svg>
      <span>Venta</span>
    </button>
    <button class="nav-btn" data-view="historial">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/>
      </svg>
      <span>Historial</span>
    </button>
    <button class="nav-btn" data-view="catalogo">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
      </svg>
      <span>Catálogo</span>
    </button>
    <button class="nav-btn" data-view="exportar">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
      </svg>
      <span>Exportar</span>
    </button>
    <button class="nav-btn" data-view="dashboard">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
      </svg>
      <span>Dashboard</span>
    </button>
  </nav>

  <!-- Toast -->
  <div class="toast-container">
    <div id="toast" class="toast"></div>
  </div>

  <!-- Modal -->
  <div id="modal-overlay" class="modal-overlay">
    <div class="modal-content">
      <h3 id="modal-title" class="modal-title"></h3>
      <div id="modal-body"></div>
      <div class="modal-actions">
        <button class="btn btn-secondary" id="modal-cancel">Cancelar</button>
        <button class="btn btn-primary" id="modal-confirm">Confirmar</button>
      </div>
    </div>
  </div>

  <!-- Loader -->
  <div id="loader-overlay" class="loader-overlay">
    <div class="spinner"></div>
  </div>

  <!-- SheetJS -->
  <script src="lib/xlsx.full.min.js"></script>

  <!-- App JS -->
  <script src="js/config.js"></script>
  <script src="js/state.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/api.js"></script>
  <script src="js/components/toast.js"></script>
  <script src="js/components/modal.js"></script>
  <script src="js/components/loader.js"></script>
  <script src="js/components/nav.js"></script>
  <script src="js/views/registrar.js"></script>
  <script src="js/views/historial.js"></script>
  <script src="js/views/catalogo.js"></script>
  <script src="js/views/exportar.js"></script>
  <script src="js/views/dashboard.js"></script>
  <script src="js/router.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
